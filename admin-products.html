<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Products — Rapidfeet Admin</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico" />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700;1,800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/components-2.css" />
    <link rel="stylesheet" href="css/pages.css" />
  </head>
  <body class="form-rf">
    <div class="admin-shell">
      <aside
        class="admin-sidebar d-flex flex-column"
        id="admin-sidebar-mount"
      ></aside>

      <div class="admin-main">
        <div
          class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2"
        >
          <h2 class="display italic-slant" style="font-size: var(--fs-lg)">
            Products
          </h2>
          <div class="d-flex gap-2">
            <button class="rf-icon-btn" data-theme-toggle>
              <i class="bi bi-moon-fill"></i><i class="bi bi-sun-fill"></i>
            </button>
            <button class="btn-rf btn-rf-primary" id="add-product-btn">
              <i class="bi bi-plus-lg"></i> Add Product
            </button>
          </div>
        </div>

        <div class="d-flex gap-2 mb-3 flex-wrap">
          <input
            type="text"
            class="form-control"
            id="admin-search"
            placeholder="Search by name, brand, SKU..."
            style="
              max-width: 320px;
              background: var(--bg-elevated);
              border: 1.5px solid var(--border);
              color: var(--text);
            "
          />
          <select
            class="form-select"
            id="admin-filter-category"
            style="
              max-width: 180px;
              background: var(--bg-elevated);
              border: 1.5px solid var(--border);
              color: var(--text);
            "
          >
            <option value="">All categories</option>
          </select>
          <select
            class="form-select"
            id="admin-filter-stock"
            style="
              max-width: 180px;
              background: var(--bg-elevated);
              border: 1.5px solid var(--border);
              color: var(--text);
            "
          >
            <option value="">All stock levels</option>
            <option value="in">In stock</option>
            <option value="low">Low stock</option>
            <option value="out">Out of stock</option>
          </select>
        </div>

        <div class="admin-table-wrap">
          <div class="table-responsive">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Image</th>
                  <th>Name</th>
                  <th>Brand</th>
                  <th>Category</th>
                  <th>Price</th>
                  <th>Qty</th>
                  <th>Colors</th>
                  <th>Stock</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="admin-products-body"></tbody>
            </table>
          </div>
          <div
            class="p-4 text-center text-faint"
            id="admin-no-results"
            style="display: none"
          >
            No products match your search.
          </div>
        </div>
        <p class="text-faint mt-3" style="font-size: var(--fs-xs)">
          Showing <span id="admin-result-count">0</span> of
          <span id="admin-total-count">0</span> products. Changes are stored
          locally for this demo session.
        </p>
      </div>
    </div>

    <!-- ============ ADD/EDIT MODAL ============ -->
    <div class="admin-modal-backdrop" id="product-modal">
      <div class="admin-modal">
        <div class="admin-modal__head">
          <h5 id="modal-title">Add Product</h5>
          <button
            class="btn-rf-ghost"
            style="padding: 4px"
            id="close-modal-btn"
          >
            <i class="bi bi-x-lg"></i>
          </button>
        </div>
        <div class="admin-modal__body">
          <form id="product-form">
            <input type="hidden" id="pf-id" />
            <div class="row g-3">
              <div class="col-md-8">
                <label>Product name</label>
                <input type="text" class="form-control" id="pf-name" required />
              </div>
              <div class="col-md-4">
                <label>SKU</label>
                <input type="text" class="form-control" id="pf-sku" required />
              </div>
              <div class="col-md-6">
                <label>Brand</label>
                <select class="form-select" id="pf-brand" required></select>
              </div>
              <div class="col-md-6">
                <label>Category</label>
                <select class="form-select" id="pf-category" required></select>
              </div>
              <div class="col-md-6">
                <label>Price (VND)</label>
                <input
                  type="number"
                  class="form-control"
                  id="pf-price"
                  required
                  min="0"
                  step="1000"
                />
              </div>
              <div class="col-md-6">
                <label>Quantity in stock</label>
                <input
                  type="number"
                  class="form-control"
                  id="pf-stock"
                  required
                  min="0"
                />
              </div>
              <div class="col-md-6">
                <label>Gender</label>
                <select class="form-select" id="pf-gender">
                  <option>Men</option>
                  <option>Women</option>
                  <option>Unisex</option>
                </select>
              </div>
              <div class="col-md-6">
                <label>Image URL</label>
                <input
                  type="text"
                  class="form-control"
                  id="pf-image"
                  placeholder="https://..."
                />
              </div>
              <div class="col-12">
                <label>Available colors (comma separated)</label>
                <input
                  type="text"
                  class="form-control"
                  id="pf-colors"
                  placeholder="Jet Black, Cloud White"
                />
              </div>
              <div class="col-12">
                <label>Available sizes (comma separated EU sizes)</label>
                <input
                  type="text"
                  class="form-control"
                  id="pf-sizes"
                  placeholder="39, 40, 41, 42"
                />
              </div>
              <div class="col-12">
                <label>Description (EN)</label>
                <textarea
                  class="form-control"
                  id="pf-desc-en"
                  rows="2"
                ></textarea>
              </div>
            </div>
          </form>
        </div>
        <div class="admin-modal__foot">
          <button class="btn-rf btn-rf-outline" id="cancel-modal-btn">
            Cancel
          </button>
          <button class="btn-rf btn-rf-primary" id="save-product-btn">
            Save Product
          </button>
        </div>
      </div>
    </div>

    <!-- ============ DELETE CONFIRM MODAL ============ -->
    <div class="admin-modal-backdrop" id="delete-modal">
      <div class="admin-modal" style="max-width: 420px">
        <div class="admin-modal__body text-center py-5">
          <i
            class="bi bi-exclamation-triangle-fill"
            style="font-size: 2.5rem; color: var(--err)"
          ></i>
          <h5 class="mt-3">Delete this product?</h5>
          <p class="text-soft">
            This action cannot be undone in this demo session.
          </p>
        </div>
        <div class="admin-modal__foot" style="justify-content: center">
          <button class="btn-rf btn-rf-outline" id="cancel-delete-btn">
            Cancel
          </button>
          <button class="btn-rf btn-rf-ember" id="confirm-delete-btn">
            Delete
          </button>
        </div>
      </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/store.js"></script>
    <script src="js/admin-layout.js"></script>
    <script src="js/admin-products.js"></script>
    <script>
      if (rfAdminGuard()) {
        rfApplyTheme();
        rfInjectAdminLayout("products");
        document
          .querySelector("[data-theme-toggle]")
          .addEventListener("click", rfToggleTheme);
        rfInitAdminProducts();
      }
    </script>
  </body>
</html>
