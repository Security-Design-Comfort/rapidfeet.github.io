<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Customers — Rapidfeet Admin</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico" />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700;1,800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/components-2.css" />
    <link rel="stylesheet" href="css/pages.css" />
  </head>
  <body class="form-rf">
    <div class="admin-shell">
      <aside
        class="admin-sidebar d-flex flex-column"
        id="admin-sidebar-mount"
      ></aside>

      <div class="admin-main">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="display italic-slant" style="font-size: var(--fs-lg)">
            Customers
          </h2>
          <button class="rf-icon-btn" data-theme-toggle>
            <i class="bi bi-moon-fill"></i><i class="bi bi-sun-fill"></i>
          </button>
        </div>

        <div class="admin-table-wrap">
          <div class="table-responsive">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Orders</th>
                  <th>Total Spent</th>
                  <th>Joined</th>
                </tr>
              </thead>
              <tbody id="admin-customers-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/store.js"></script>
    <script src="js/admin-layout.js"></script>
    <script>
      if (rfAdminGuard()) {
        rfApplyTheme();
        rfInjectAdminLayout("customers");
        document
          .querySelector("[data-theme-toggle]")
          .addEventListener("click", rfToggleTheme);

        const names = [
          "Minh Tran",
          "Sarah Kim",
          "David Le",
          "Anna Pham",
          "Carlos Mendez",
          "Linh Nguyen",
          "James Wu",
          "Hoa Vo",
          "Peter Chen",
          "Mai Tran",
        ];
        const rows = names.map((n, i) => ({
          name: n,
          email: n.toLowerCase().replace(" ", ".") + "@email.com",
          orders: 1 + ((i * 3) % 9),
          spent: 800000 + ((i * 317000) % 4500000),
          joined: `2025-0${1 + (i % 9)}-1${i % 9}`,
        }));
        if (RF_STATE.user)
          rows.unshift({
            name: RF_STATE.user.name,
            email: RF_STATE.user.email,
            orders: RF_STATE.orders.length,
            spent: RF_STATE.orders.reduce((s, o) => s + o.total, 0),
            joined: "2026-06-18",
          });

        document.getElementById("admin-customers-body").innerHTML = rows
          .map(
            (c) => `
      <tr><td>${c.name}</td><td>${c.email}</td><td>${c.orders}</td><td>${rfFormatVND(c.spent)}</td><td>${c.joined}</td></tr>
    `,
          )
          .join("");
      }
    </script>
  </body>
</html>
