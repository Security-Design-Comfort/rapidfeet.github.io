<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product — Rapidfeet</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico" />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700;1,800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/components-2.css" />
    <link rel="stylesheet" href="css/pages.css" />
    <style>
      .pdp-thumbs {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .pdp-thumbs img {
        width: 72px;
        height: 72px;
        object-fit: cover;
        border: 1.5px solid var(--border);
        cursor: pointer;
        transition: border-color 0.15s;
      }
      .pdp-thumbs img.active {
        border-color: var(--ember);
      }
      .pdp-main-img {
        aspect-ratio: 1/1;
        background: var(--bg-sunken);
        overflow: hidden;
        clip-path: polygon(
          0 0,
          calc(100% - 24px) 0,
          100% 24px,
          100% 100%,
          0 100%
        );
      }
      .pdp-main-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .pdp-gallery {
        display: flex;
        gap: 14px;
      }
      @media (max-width: 767.98px) {
        .pdp-gallery {
          flex-direction: column-reverse;
        }
        .pdp-thumbs {
          flex-direction: row;
          overflow-x: auto;
        }
      }
      .accordion-rf-item {
        border-bottom: 1px solid var(--border);
      }
      .accordion-rf-btn {
        width: 100%;
        text-align: left;
        background: none;
        border: 0;
        padding: 16px 0;
        font-weight: 700;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: var(--text);
      }
      .accordion-rf-body {
        display: none;
        padding-bottom: 16px;
        color: var(--text-soft);
        font-size: var(--fs-sm);
      }
      .accordion-rf-item.open .accordion-rf-body {
        display: block;
      }
      .accordion-rf-item.open .accordion-rf-btn i {
        transform: rotate(180deg);
      }
      .review-card {
        border-bottom: 1px solid var(--border);
        padding: var(--sp-4) 0;
      }
      .review-stars i {
        color: #ffb400;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body data-active="catalog">
    <div id="rf-header-mount"></div>

    <main id="main">
      <div class="container-rf">
        <nav class="rf-breadcrumb">
          <a href="index.html"
            ><span lang-en>Home</span><span lang-vi>Trang chủ</span></a
          >
          <i class="bi bi-chevron-right" style="font-size: 10px"></i>
          <a href="catalog.html"
            ><span lang-en>Catalog</span><span lang-vi>Sản phẩm</span></a
          >
          <i class="bi bi-chevron-right" style="font-size: 10px"></i>
          <span id="bc-product-name">...</span>
        </nav>
      </div>

      <div
        class="container-rf"
        style="padding-bottom: var(--sp-9)"
        id="pdp-root"
      >
        <!-- filled by JS -->
      </div>

      <!-- ============ RELATED PRODUCTS ============ -->
      <section class="section" style="padding-top: 0">
        <div class="container-rf">
          <div class="section-head">
            <h2>
              <span lang-en>You might also like</span
              ><span lang-vi>Có thể bạn cũng thích</span>
            </h2>
          </div>
          <div class="row g-4" id="related-grid"></div>
        </div>
      </section>
    </main>

    <div id="rf-footer-mount"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/store.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/product-card.js"></script>
    <script src="js/product-detail.js"></script>
    <script>
      rfInjectLayout("catalog");
      rfInitProductDetail();
    </script>
  </body>
</html>
