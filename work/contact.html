<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact — Rapidfeet</title>
    <link rel="icon" type="image/x-icon" href="../logo/favicon/favicon.ico" />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700;1,800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/components-2.css" />
    <link rel="stylesheet" href="css/pages.css" />
  </head>
  <body data-active="contact" class="form-rf">
    <div id="rf-header-mount"></div>

    <main id="main">
      <div class="page-hero-sm">
        <div class="container-rf">
          <h1>
            <span lang-en>Get in touch</span
            ><span lang-vi>Liên hệ với chúng tôi</span>
          </h1>
        </div>
      </div>

      <section class="section">
        <div class="container-rf">
          <div class="row g-5">
            <div class="col-lg-5">
              <div class="vstack">
                <div class="contact-info-card">
                  <i class="bi bi-geo-alt-fill"></i>
                  <div>
                    <strong
                      ><span lang-en>Store address</span
                      ><span lang-vi>Địa chỉ cửa hàng</span></strong
                    >
                    <p class="text-soft mb-0" style="font-size: var(--fs-sm)">
                      500 Ton Dan, An Khe, Da Nang
                    </p>
                  </div>
                </div>
                <div class="contact-info-card">
                  <i class="bi bi-telephone-fill"></i>
                  <div>
                    <strong
                      ><span lang-en>Hotline</span
                      ><span lang-vi>Tổng đài</span></strong
                    >
                    <p class="text-soft mb-0" style="font-size: var(--fs-sm)">
                      1900 6868 (8:00 – 21:00)
                    </p>
                  </div>
                </div>
                <div class="contact-info-card">
                  <i class="bi bi-envelope-fill"></i>
                  <div>
                    <strong>Email</strong>
                    <p class="text-soft mb-0" style="font-size: var(--fs-sm)">
                      support@rapidfeet.vn
                    </p>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-lg-7">
              <form
                id="contact-form"
                novalidate
                action="https://formspree.io/f/mzdqldzb"
                method="POST"
              >
                <div class="row g-3">
                  <div class="col-md-6">
                    <label
                      ><span lang-en>Name</span
                      ><span lang-vi>Họ tên</span></label
                    >
                    <input
                      type="text"
                      class="form-control"
                      name="name"
                      required
                    />
                  </div>
                  <div class="col-md-6">
                    <label>Email</label>
                    <input
                      type="email"
                      class="form-control"
                      name="email"
                      required
                    />
                  </div>
                  <div class="col-12">
                    <label
                      ><span lang-en>Subject</span
                      ><span lang-vi>Chủ đề</span></label
                    >
                    <input
                      type="text"
                      class="form-control"
                      name="subject"
                      required
                    />
                  </div>
                  <div class="col-12">
                    <label
                      ><span lang-en>Message</span
                      ><span lang-vi>Nội dung</span></label
                    >
                    <textarea
                      class="form-control"
                      name="message"
                      rows="5"
                      required
                    ></textarea>
                  </div>
                </div>
                <button
                  type="submit"
                  class="btn-rf btn-rf-primary btn-rf-lg mt-4"
                  id="contact-submit-btn"
                >
                  <span lang-en>Send message</span
                  ><span lang-vi>Gửi tin nhắn</span>
                </button>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="rf-footer-mount"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/store.js"></script>
    <script src="js/layout.js"></script>
    <script>
      rfInjectLayout("contact");
      document
        .getElementById("contact-form")
        .addEventListener("submit", (e) => {
          e.preventDefault();
          let valid = true;
          e.target.querySelectorAll("[required]").forEach((el) => {
            if (!el.checkValidity()) {
              valid = false;
              el.classList.add("is-invalid");
            } else el.classList.remove("is-invalid");
          });
          if (!valid) return;
          rfToast(
            RF_STATE.lang === "vi" ? "Đã gửi tin nhắn!" : "Message sent!",
          );
          e.target.reset();
        });
    </script>
  </body>
</html>
