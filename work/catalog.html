<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catalog — Rapidfeet</title>
    <link rel="icon" type="image/x-icon" href="../logo/favicon/favicon.ico" />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700;1,800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/components-2.css" />
    <link rel="stylesheet" href="css/pages.css" />
  </head>
  <body data-active="catalog">
    <div id="rf-header-mount"></div>

    <main id="main">
      <div class="container-rf">
        <nav class="rf-breadcrumb">
          <a href="index.html"
            ><span lang-en>Home</span><span lang-vi>Trang chủ</span></a
          >
          <i class="bi bi-chevron-right" style="font-size: 10px"></i>
          <span><span lang-en>Catalog</span><span lang-vi>Sản phẩm</span></span>
        </nav>
      </div>

      <div class="container-rf" style="padding-bottom: var(--sp-9)">
        <div
          class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4"
        >
          <div>
            <h1
              class="display italic-slant"
              style="font-size: var(--fs-xl)"
              id="catalog-title"
            >
              <span lang-en>All shoes</span><span lang-vi>Tất cả giày</span>
            </h1>
            <p
              class="text-faint"
              id="result-count"
              style="font-size: var(--fs-sm)"
            ></p>
          </div>
          <div class="d-flex gap-2 align-items-center">
            <button
              class="btn-rf btn-rf-outline btn-rf-sm mobile-filter-toggle"
              data-bs-toggle="offcanvas"
              data-bs-target="#filterOffcanvas"
            >
              <i class="bi bi-sliders"></i> <span lang-en>Filters</span
              ><span lang-vi>Lọc</span>
            </button>
            <select
              class="form-select form-rf"
              id="sort-select"
              style="
                width: auto;
                background: var(--bg-elevated);
                border: 1.5px solid var(--border);
                color: var(--text);
                padding: 10px 14px;
                font-size: var(--fs-sm);
              "
            >
              <option value="featured" data-en="Featured" data-vi="Nổi bật">
                Featured
              </option>
              <option value="new" data-en="Newest" data-vi="Mới nhất">
                Newest
              </option>
              <option
                value="price-asc"
                data-en="Price: Low to High"
                data-vi="Giá: Thấp đến cao"
              >
                Price: Low to High
              </option>
              <option
                value="price-desc"
                data-en="Price: High to Low"
                data-vi="Giá: Cao đến thấp"
              >
                Price: High to Low
              </option>
              <option value="rating" data-en="Top rated" data-vi="Đánh giá cao">
                Top rated
              </option>
            </select>
            <button
              class="rf-icon-btn"
              id="sort-filter-icon-btn"
              data-bs-toggle="offcanvas"
              data-bs-target="#filterOffcanvas"
              aria-label="Filter"
              title="Filter"
            >
              <i class="bi bi-funnel"></i>
            </button>
          </div>
        </div>

        <div class="row g-4">
          <!-- ============ DESKTOP FILTER SIDEBAR ============ -->
          <div class="col-lg-3 filter-panel-desktop">
            <div id="filter-panel-content"></div>
          </div>

          <!-- ============ PRODUCT GRID ============ -->
          <div class="col-lg-9">
            <div class="d-flex gap-2 flex-wrap mb-3" id="active-chips"></div>
            <div class="row g-4" id="product-grid"></div>
            <div id="empty-state" style="display: none">
              <div class="empty-state">
                <i class="bi bi-search"></i>
                <h3>
                  <span lang-en>No shoes found</span
                  ><span lang-vi>Không tìm thấy</span>
                </h3>
                <p>
                  <span lang-en>Try adjusting your filters or search term.</span
                  ><span lang-vi>Hãy thử điều chỉnh bộ lọc của bạn.</span>
                </p>
                <button class="btn-rf btn-rf-outline" id="clear-filters-empty">
                  <span lang-en>Clear filters</span
                  ><span lang-vi>Xóa bộ lọc</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- ============ MOBILE FILTER OFFCANVAS ============ -->
    <div
      class="offcanvas offcanvas-start filter-offcanvas"
      id="filterOffcanvas"
      style="background: var(--bg); width: 340px; max-width: 88vw"
    >
      <div
        class="offcanvas-header"
        style="border-bottom: 1px solid var(--border)"
      >
        <h5 style="color: var(--text)">
          <span lang-en>Filters</span><span lang-vi>Bộ lọc</span>
        </h5>
        <button
          class="btn-close"
          data-bs-dismiss="offcanvas"
          aria-label="Close"
        ></button>
      </div>
      <div class="offcanvas-body p-0">
        <div id="filter-panel-content-mobile"></div>
        <div class="p-4">
          <button
            class="btn-rf btn-rf-primary btn-rf-block"
            data-bs-dismiss="offcanvas"
          >
            <span lang-en>Show results</span><span lang-vi>Xem kết quả</span>
          </button>
        </div>
      </div>
    </div>

    <div id="rf-footer-mount"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/store.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/product-card.js"></script>
    <script src="js/catalog.js"></script>
    <script>
      rfInjectLayout("catalog");
      rfInitCatalog();
    </script>
  </body>
</html>
